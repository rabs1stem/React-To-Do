name: ci
on:
  push:
    branches: [main, feature]
  pull_request:
    branches: [main]
jobs:
  secrets:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
  backend:
    needs: secrets
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-cov pytest-xdist pytest-asyncio pip-audit httpx
      - name: Dependency vulnerability scan
        run: pip-audit
      - name: Ruff checks
        run: ruff check .
      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          pytest -n auto \
          --cov=. \
          --cov-report=term-missing \
          --asyncio-mode=auto \
          -q
  frontend:
    needs: secrets
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npx eslint src --ext .js,.jsx
      - name: Build test
        run: CI=false npm run build
      - name: Run tests
        run: CI=true npm test -- --watchAll=false --passWithNoTests
  docker:
    needs: [backend, frontend]
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
      - run: |
          cat > .env <<EOF
          POSTGRES_DB=${{vars.POSTGRES_DB}}
          POSTGRES_USER=${{vars.POSTGRES_USER}}
          POSTGRES_PASSWORD=${{secrets.POSTGRES_PASSWORD}}
          DATABASE_URL=${{secrets.DATABASE_URL}}
          JWT_SECRET_KEY=${{secrets.JWT_SECRET_KEY}}
          SECRET_KEY=${{secrets.SECRET_KEY}}
          EOF
      - name: Validate compose config
        run: docker compose config
      - run: docker compose up -d --build
      - run: |
          for i in {1..30}; do
            curl -fsS http://localhost:81/health && exit 0
            sleep 2
          done
          exit 1
      - if: success()
        run: docker ps
      - if: failure()
        run: docker compose logs
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y trivy
      - name: Scan backend image
        run: trivy image backend_app --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1
      - name: Scan frontend image
        run: trivy image frontend_app --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1

      - if: always()
        run: |
          docker compose down -v
          rm -f .env
