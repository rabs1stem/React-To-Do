name: ci
on:
  push:
    branches: [main, feature]
  pull_request:
    branches: [main]
jobs:
  secrets:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
  backend:
    needs: secrets
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-cov pytest-xdist pytest-asyncio pip-audit
      - name: Dependency vulnerability scan
        run: pip-audit
      - name: Ruff checks
        run: ruff check backend
      - name: Run tests
        run: |
          pytest -n auto --cov=backend --cov-report=term-missing --asyncio-mode=auto -q
  frontend:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build test
        run: CI=false npm run build
      - name: Run tests
        run: CI=true npm test -- --watchAll=false --passWithNoTests
  docker:
    needs: [backend, frontend]
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
      - run: |
          cat > .env <<EOF
          POSTGRES_DB=${{vars.POSTGRES_DB}}
          POSTGRES_USER=${{vars.POSTGRES_USER}}
          POSTGRES_PASSWORD=${{secrets.POSTGRES_PASSWORD}}
          DATABASE_URL=${{secrets.DATABASE_URL}}
          JWT_SECRET_KEY=${{secrets.JWT_SECRET_KEY}}
          SECRET_KEY=${{secrets.SECRET_KEY}}
          EOF
      - run: docker compose up -d --build
      - run: sleep 25
      - run: docker ps
      - run: curl -fsS http://localhost:81/health || exit 1
      - if: failure()
        run: docker compose logs
      - if: always()
        run: |
          rm -f .env
          docker compose down -v
