services:
  postgres:
    image: postgres:16-alpine
    container_name: pgdata
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-todo_db}",
        ]
      interval: 20s
      timeout: 5s
      start_period: 10s
      retries: 3
    volumes:
      - pgdata:/var/lib/postgresql/data
    env_file:
      - .env
    networks:
      - pups
  backend:
    container_name: backend_app
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    expose:
      - "8000"
    command: gunicorn backend.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --workers 2
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pups
  frontend:
    container_name: frontend_app
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "81:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - pups
volumes:
  pgdata:
networks:
  pups:
    driver: bridge
