apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: reac

spec:
  replicas: 2
  revisionHistoryLimit: 3

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: backend
          image: backend_app:v1
          imagePullPolicy: Never

          command:
            - gunicorn
            - main:app
            - -k
            - uvicorn.workers.UvicornWorker
            - --bind
            - 0.0.0.0:8000
            - --workers
            - "1"

          ports:
            - containerPort: 8000

          env:
            - name: HOME
              value: /tmp

            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: reac-secret
                  key: DATABASE_URL

            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: reac-secret
                  key: JWT_SECRET_KEY

            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: reac-secret
                  key: SECRET_KEY

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp

          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 30
            periodSeconds: 5

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3

          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: reac

spec:
  type: ClusterIP

  selector:
    app: backend

  ports:
    - port: 8000
      targetPort: 8000
